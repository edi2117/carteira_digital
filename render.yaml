services:
  - type: web
    name: carteira-api
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        fromService:
          name: carteira-api
          type: web
          property: url
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromService:
          name: carteira-db
          type: pserv
          property: host
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        fromService:
          name: carteira-db
          type: pserv
          property: database
      - key: DB_USERNAME
        fromService:
          name: carteira-db
          type: pserv
          property: user
      - key: DB_PASSWORD
        fromService:
          name: carteira-db
          type: pserv
          property: password
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: CACHE_STORE
        value: file
    healthCheckPath: /api/health
    disk:
      name: laravel-storage
      mountPath: /var/www/html/storage
      sizeGB: 1

  - type: web
    name: carteira-frontend
    env: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        fromService:
          name: carteira-api
          type: web
          property: url
        suffix: /api
    routes:
      - type: rewrite
        source: /**/*
        destination: /index.html

  - type: pserv
    name: carteira-db
    plan: free
    env: postgres
    autoDeploy: false
